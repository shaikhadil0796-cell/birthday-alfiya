<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Alfiya ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:linear-gradient(to bottom,#1a001a,#330033);
color:white;
text-align:center;
font-family:cursive;
}

h1{
color:pink;
font-size:45px;
}

h2{
color:#ffb6c1;
}

.slider{
width:300px;
height:450px;
margin:auto;
position:relative;
overflow:hidden;
border-radius:20px;
box-shadow:0 0 20px pink;
}

.slider img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
animation:slide 20s infinite;
}

.slider img:nth-child(1){animation-delay:0s;}
.slider img:nth-child(2){animation-delay:5s;}
.slider img:nth-child(3){animation-delay:10s;}
.slider img:nth-child(4){animation-delay:15s;}

@keyframes slide{
0%{opacity:0;}
10%{opacity:1;}
25%{opacity:1;}
35%{opacity:0;}
100%{opacity:0;}
}

.message{
padding:20px;
font-size:22px;
line-height:40px;
}

.footer{
font-size:28px;
color:pink;
padding:30px;
}

button{
padding:15px;
font-size:20px;
border-radius:20px;
background:pink;
}

</style>

</head>
<body>

<h1>🎂 Happy Birthday Alfiya ❤️</h1>

<h2>Madam Ji 👑</h2>

<div class="slider">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">

</div>

<div class="message">

💌 Ye din khas aapka hai,<br>
Aur mera har din khas aapke hone se hai ❤️<br><br>

🧿 Aapki happiness mere liye sabse zyada important hai.<br><br>

♾️ Keep smiling forever ❤️

</div>

<div class="footer">

🐸 From Your Mendak ❤️

<br><br>

Mendak yahan hai sirf apni Madam Ji ko khush rakhne ke liye ❤️

</div>

</body>
</html>
